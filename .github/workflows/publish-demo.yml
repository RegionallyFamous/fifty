name: publish demo site

# Rebuild and deploy the GH Pages demo site after any push to main.
# Uses actions/deploy-pages so no git push to main is needed — GITHUB_TOKEN
# with pages:write is sufficient, no PAT required.

on:
  push:
    branches: [main]
    paths:
      - "*/playground/blueprint.json"
      - "*/theme.json"
      - "docs/**"
      - "mockups/**"
      - "bin/build-redirects.py"
      - "bin/_lib.py"

  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Only one Pages deployment at a time; cancel in-progress if a newer push
# lands while we're building.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  publish:
    name: rebuild & deploy to Pages
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: install deps
        run: pip install -r requirements-dev.txt --quiet

      - name: rebuild docs/
        run: python3 bin/build-redirects.py

      - name: upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/

      - name: deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
