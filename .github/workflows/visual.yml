name: visual

# Pixel-diff visual regression gate AND cloud-side gallery regenerator.
#
# Runs `python3 bin/snap.py shoot <theme>` (one theme per matrix entry)
# in headless Chromium, compares against tests/visual-baseline/<theme>/,
# and runs the tiered-quality gate (heuristic errors, accessibility
# violations, HTTP failures) with `--strict` in the aggregator.
#
# This workflow is DELIBERATELY SEPARATE from `check.yml`:
#   * `check.yml`  — fast static gate (~30 s). Always required.
#   * `visual.yml` — slow (~8-12 min wall) browser-driven gate.
#                    Required only on PRs that touch a theme directory.
#
# ---- Why matrix-per-theme ---------------------------------------------
# Until 2026-04, this ran as one ubuntu-latest job that walked all 5
# themes in-process at `--concurrency=2`. That hit two ceilings:
#   1. Wall time: 35-45 min per run (laptop-overheating fix → cloud,
#      but cloud minutes still aren't free, and 45-min feedback loops
#      kill iteration speed).
#   2. EADDRINUSE flakes on the 4th/5th theme: `wp-playground-cli`
#      binds IPv6 :::9400 in Node, but `find_free_port` only probes
#      IPv4. With concurrency=2 (or even 1, if the previous theme's
#      port is still in TIME_WAIT), the next boot races and Node
#      raises EADDRINUSE before we can fall through to 9401.
#
# Matrix-per-theme sidesteps both: each theme gets its own runner VM
# (its own kernel = its own port table → impossible to collide), and
# the 5 jobs run in parallel so wall time drops from ~43 min to ~12.
# `--concurrency 1` inside each runner means no in-process port race
# either.
#
# Topology:
#
#     setup (~30s)
#       └── outputs JSON theme array + mode
#           ├── shoot[aero]      (~8-10 min, parallel)
#           ├── shoot[chonk]     (~8-10 min, parallel)
#           ├── shoot[lysholm]   (~8-10 min, parallel)
#           ├── shoot[obel]      (~8-10 min, parallel)
#           └── shoot[selvedge]  (~8-10 min, parallel)
#                 └── aggregate (~2-3 min)
#                     downloads all snap-* artifacts, runs report
#                     (check-changed) or gallery-rebuild +
#                     auto-commit (regenerate-gallery / rebaseline)
#
# Three modes (workflow_dispatch + auto-resolved on push/PR):
#   * `check-changed` (default for PR/push): only shoot themes touched
#     by `origin/main..HEAD` (framework-wide bin/* changes fall back
#     to all themes). Aggregator runs `snap.py report --strict`.
#   * `regenerate-gallery` (manual): shoot all (or `themes:` subset),
#     rebuild docs/snaps/, auto-commit back to the branch with
#     `[skip ci]`.
#   * `rebaseline` (manual): shoot all (or subset), promote tmp/snaps
#     into tests/visual-baseline/, regenerate per-theme screenshot.png,
#     auto-commit (no `[skip ci]` — the new baseline must be re-gated).
#
# Warn-only rollout: see header on `visual-aggregate` job.

on:
  push:
    branches: [main]
    # Wildcard paths so a new theme directory triggers the gate
    # without editing this workflow. `bin/visual-matrix.py` filters
    # the actual matrix down to the changed themes inside the setup
    # job, so over-triggering here just means a few extra noop setup
    # runs (cheap) rather than a missed gate (expensive).
    paths:
      - '**/theme.json'
      - '**/functions.php'
      - '**/templates/**'
      - '**/parts/**'
      - '**/patterns/**'
      - '**/styles/**'
      - '**/playground/**'
      - 'bin/snap.py'
      - 'bin/snap_config.py'
      - 'bin/visual-matrix.py'
      - 'tests/visual-baseline/**'
      - '.github/workflows/visual.yml'
  pull_request:
    branches: [main]
    paths:
      - '**/theme.json'
      - '**/functions.php'
      - '**/templates/**'
      - '**/parts/**'
      - '**/patterns/**'
      - '**/styles/**'
      - '**/playground/**'
      - 'bin/snap.py'
      - 'bin/snap_config.py'
      - 'bin/visual-matrix.py'
      - 'tests/visual-baseline/**'
      - '.github/workflows/visual.yml'
  workflow_dispatch:
    inputs:
      mode:
        type: choice
        description: 'What to do'
        options:
          - check-changed
          - regenerate-gallery
          - rebaseline
        default: regenerate-gallery
      themes:
        description: 'Space-separated theme slugs (blank = all)'
        required: false
        default: ''

concurrency:
  # One visual run per branch at a time. The aggregator commits to the
  # branch in regenerate-gallery / rebaseline modes; overlapping runs
  # would race the auto-push.
  group: visual-${{ github.ref }}
  cancel-in-progress: true

# `regenerate-gallery` and `rebaseline` modes commit back to the
# triggering branch, so the aggregator job needs write access. The
# matrix shoot jobs are read-only but the elevated scope is harmless
# (no `git push` happens in them).
permissions:
  contents: write

jobs:
  # ------------------------------------------------------------------
  # SETUP — figure out which themes need shooting + what to do with them
  # ------------------------------------------------------------------
  # Cheap (~30s) job that resolves the (mode, themes[], do_full_shoot)
  # tuple consumed by every downstream job. Splitting this out keeps
  # the matrix definition declarative (`fromJSON(needs.setup.outputs.themes)`)
  # and makes the resolved scope visible in the run log without having
  # to spelunk into the shoot job's first step.
  setup:
    name: bin/snap.py (setup)
    runs-on: ubuntu-latest
    timeout-minutes: 3
    outputs:
      mode: ${{ steps.scope.outputs.mode }}
      themes: ${{ steps.scope.outputs.themes }}
      do_full_shoot: ${{ steps.scope.outputs.do_full_shoot }}
      base_ref: ${{ steps.scope.outputs.base_ref }}
      has_themes: ${{ steps.scope.outputs.has_themes }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          # Need full history so `_changed_themes(origin/main)` works
          # (otherwise the shallow clone has no merge-base for the diff).
          fetch-depth: 0
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - name: Resolve scope
        id: scope
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_MODE: ${{ github.event.inputs.mode }}
          INPUT_THEMES: ${{ github.event.inputs.themes }}
          # `BASE_REF` selection is event-dependent:
          #   * push    → diff against the previous HEAD
          #               (github.event.before). Comparing against
          #               origin/main when HEAD already IS origin/main
          #               yields an empty diff, which made
          #               _changed_themes return [], which made the
          #               whole matrix skip — defeating the purpose of
          #               the `paths:` filter that already decided this
          #               push warranted a re-shoot.
          #   * pull_request → diff against origin/main, the merge
          #               base. github.event.before for a PR refers to
          #               the branch's previous tip, which would only
          #               re-shoot the *delta* of the latest push and
          #               miss any earlier theme changes the reviewer
          #               needs to see gated.
          BASE_REF: >-
            ${{
              github.event_name == 'push'
                && github.event.before
                || 'origin/main'
            }}
        run: python3 bin/visual-matrix.py

  # ------------------------------------------------------------------
  # SHOOT — one theme per runner, fully parallel
  # ------------------------------------------------------------------
  # Each entry boots its own Playground on its own VM, so:
  #   * no IPv6 / IPv4 EADDRINUSE collisions across themes (own kernel)
  #   * no laptop-overheating-equivalent CPU contention
  #   * one theme failing (boot crash, 500-erroring route) doesn't
  #     poison the others — fail-fast: false lets every theme finish
  #     so the human reviewer sees the full picture in one run.
  shoot:
    name: bin/snap.py (${{ matrix.theme }})
    needs: setup
    if: needs.setup.outputs.has_themes == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 25
    strategy:
      fail-fast: false
      matrix:
        theme: ${{ fromJSON(needs.setup.outputs.themes) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: requirements-dev.txt

      - name: Install Python dependencies
        run: |
          python3 -m pip install --upgrade pip
          # Playwright is not in requirements-dev.txt because bin/snap.py
          # is the only consumer; install the same pinned version used
          # locally. Keep this pin in lockstep with bin/snap.py.
          python3 -m pip install -r requirements-dev.txt playwright==1.58.0 Pillow

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ runner.os }}-1.58.0

      - name: Install Playwright Chromium
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: python3 -m playwright install --with-deps chromium

      - name: Install system deps for Playwright (cache hit case)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: python3 -m playwright install-deps chromium

      - name: Restore Playground state cache
        # Per-theme warm WordPress install. `--cache-state` in snap.py
        # primes `tmp/playground-state/<theme>/wordpress` on first boot
        # (WP install + WXR + WC seeder writes straight through the
        # NODEFS mount), and on every subsequent boot skips those
        # ~40-100s steps via `install-from-existing-files-if-needed`.
        #
        # Cache key ingredients:
        #   * theme slug (obvious — cache is per-theme)
        #   * playground/ directory hash (blueprint.json + inlined
        #     PHP scripts determine what the cache looks like)
        #   * package.json / package-lock.json (the pinned
        #     `@wp-playground/cli@<X>` lives here; snap.py's
        #     version-marker self-invalidates on mismatch, but making
        #     the cache key change too means we don't even attempt a
        #     restore against a stale entry).
        #
        # `restore-keys` falls back to the previous cache for the same
        # theme when the exact key misses — snap.py will detect any
        # stale version marker and wipe+reprime before shooting, so a
        # partial restore is never incorrect, only potentially a no-op.
        id: pg-state-cache
        uses: actions/cache@v5
        with:
          path: tmp/playground-state/${{ matrix.theme }}
          key: pg-state-v1-${{ matrix.theme }}-${{ hashFiles(format('{0}/playground/**', matrix.theme), 'package.json', 'package-lock.json') }}
          restore-keys: |
            pg-state-v1-${{ matrix.theme }}-

      - name: Shoot ${{ matrix.theme }}
        # `--concurrency 1` is enforced (default) so this single-theme
        # job stays single-process within the runner. With 1 theme +
        # 1 worker there's no possible port race (the only Node server
        # in the runner's port table is ours).
        #
        # --auto-routes (Phase 1) narrows the in-theme fan-out to just
        # the routes whose ROUTE_DEPENDENCIES map to a file in the
        # current diff. Combined with Phase 2 signature skip (on by
        # default) a PR touching a single pattern now does maybe one
        # or two cells out of the usual 44, and frequently skips the
        # Playground boot entirely. We pass `origin/main` as the base
        # so the narrowing matches the setup job's _changed_themes
        # scope exactly -- no risk of shooting against a narrower diff
        # than the matrix expected to be shot.
        #
        # We DON'T pass --auto-routes in the full-shoot modes
        # (regenerate-gallery / rebaseline) because those deliberately
        # want the whole gallery regenerated -- a workflow_dispatch
        # with "rebaseline" is the operator saying "accept every
        # current render as the new truth", and narrowing would leave
        # stale PNGs around for routes the diff didn't touch.
        #
        # FIFTY_CONTENT_REF: on a PR, rewrite the blueprint's inlined
        # `raw.githubusercontent.com/.../main/` URLs to point at the PR
        # head SHA. This lets a brand-new theme (whose playground/
        # content + images aren't on main yet) sideload its own data
        # from the PR commit instead of 404-ing on main and crashing
        # the importer with "W&O CSV looked malformed". On push/main
        # runs FIFTY_CONTENT_REF is empty and the default URLs win.
        env:
          FIFTY_CONTENT_REF: ${{ github.event.pull_request.head.sha || '' }}
        run: |
          EXTRA_ARGS=""
          if [ "${{ needs.setup.outputs.do_full_shoot }}" != "true" ]; then
            # Use the SAME diff base resolved by setup. On push/main this
            # is github.event.before; using origin/main here compares HEAD
            # to itself after checkout and every matrix job uploads no
            # artifacts, leaving the aggregate job with "No snaps to
            # report". On PRs setup resolves this to origin/main.
            EXTRA_ARGS="--auto-routes --changed-base ${{ needs.setup.outputs.base_ref }}"
          fi
          python3 bin/snap.py shoot ${{ matrix.theme }} --cache-state $EXTRA_ARGS

      - name: Diff ${{ matrix.theme }} vs baseline
        # Only meaningful for check-changed / check-manual modes; the
        # gallery / rebaseline modes don't care about diffs (they're
        # generating fresh pixels for human review or promotion).
        # We still run it for visibility — `diff` writes diff PNGs to
        # tmp/snaps/<theme>/diffs/ which the aggregator uploads as an
        # artifact.
        if: needs.setup.outputs.do_full_shoot != 'true'
        # Diff failures are surfaced by the aggregator's `report --strict`,
        # not here — we want every theme's diffs to render before the
        # gate fires.
        continue-on-error: true
        run: python3 bin/snap.py diff ${{ matrix.theme }}

      - name: Upload ${{ matrix.theme }} snap artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          # snap-${theme} naming lets the aggregator use a glob pattern
          # (`pattern: snap-*`) to download every theme's output in one
          # call without caring how many themes ran.
          name: snap-${{ matrix.theme }}
          # Wildcard `**/*` (rather than the dir literal) is intentional:
          # actions/upload-artifact preserves paths relative to the
          # lowest common ancestor of the matched files when a wildcard
          # is used, so the artifact contains `desktop/home.png` etc.
          # rather than `tmp/snaps/aero/desktop/home.png`. This is the
          # difference between download landing files at
          # `tmp/snaps/snap-aero/desktop/home.png` (good — one rename
          # away from the canonical layout) vs.
          # `tmp/snaps/snap-aero/tmp/snaps/aero/desktop/home.png` (bad
          # — double-nested).
          path: tmp/snaps/${{ matrix.theme }}/**/*
          if-no-files-found: warn
          retention-days: 14

  # ------------------------------------------------------------------
  # AGGREGATE — collect per-theme artifacts + gate / commit / rebaseline
  # ------------------------------------------------------------------
  # `if: always()` so the aggregator runs even when individual shoot
  # jobs fail — the partial gallery / report is still useful for human
  # review, and the warn-only `report --strict` here is the canonical
  # "did the gate pass?" signal.
  aggregate:
    name: bin/snap.py (aggregate)
    needs: [setup, shoot]
    if: always() && needs.setup.outputs.has_themes == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          # Prefer `FIFTY_AUTO_PAT` (repo-scoped classic PAT) so the
          # rebaseline auto-commit below retriggers this same visual.yml
          # via the `pull_request.synchronize` event — the comment at
          # the `Commit rebaselined snaps + screenshots` step depends on
          # exactly that retrigger to gate the new baselines. With only
          # GITHUB_TOKEN the push lands but the follow-up visual.yml
          # check-changed never fires, so nobody gates the new PNGs.
          # Falls back to GITHUB_TOKEN when the secret isn't set.
          # See docs/ci-pat-setup.md.
          token: ${{ secrets.FIFTY_AUTO_PAT || secrets.GITHUB_TOKEN }}
          # Need write credentials persisted for the auto-commit at the
          # end of regenerate-gallery / rebaseline modes.
          persist-credentials: true

      - name: Report push-token mode
        # Companion to the equivalent step in first-baseline.yml. A loud
        # notice when PAT is missing lets the operator know baselines
        # committed here won't be gated by a follow-up visual.yml run
        # until a human kicks CI — cheaper than silently shipping an
        # ungated baseline.
        env:
          HAS_PAT: ${{ secrets.FIFTY_AUTO_PAT != '' }}
        run: |
          if [ "$HAS_PAT" = "true" ]; then
            echo "::notice::visual.yml aggregator push will retrigger \
          downstream workflows via FIFTY_AUTO_PAT."
          else
            echo "::warning::FIFTY_AUTO_PAT secret not set — \
          visual.yml rebaseline push won't retrigger the gating run. \
          See docs/ci-pat-setup.md."
          fi

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: requirements-dev.txt

      - name: Install Python dependencies
        run: |
          python3 -m pip install --upgrade pip
          # Pillow is needed for build-snap-gallery / build-theme-screenshots.
          # Playwright is NOT installed here — the aggregator never shoots,
          # it only post-processes the per-theme tmp/snaps trees uploaded
          # by the matrix.
          python3 -m pip install -r requirements-dev.txt Pillow

      - name: Download all per-theme snap artifacts
        uses: actions/download-artifact@v7
        with:
          # Glob pattern matches every snap-<theme> artifact uploaded by
          # the matrix (snap-aero, snap-chonk, …). `merge-multiple: true`
          # flattens them into a single tmp/snaps/ tree so the rest of
          # the toolchain (build-snap-gallery, snap.py report, baseline)
          # sees the same layout it would after a local `shoot --all`.
          pattern: snap-*
          path: tmp/snaps/
          merge-multiple: false

      - name: Reshape downloaded artifacts into tmp/snaps/<theme>/
        # actions/download-artifact extracts each artifact into a
        # subdirectory named after the artifact. `pattern: snap-*` +
        # `path: tmp/snaps/` therefore lands files at
        # `tmp/snaps/snap-aero/desktop/home.png` instead of
        # `tmp/snaps/aero/desktop/home.png`. Strip the `snap-` prefix
        # so downstream tools (which expect the canonical
        # tmp/snaps/<theme>/<viewport>/<route>.png layout) just work.
        env:
          THEMES_JSON: ${{ needs.setup.outputs.themes }}
        run: |
          set -euo pipefail
          shopt -s nullglob
          for d in tmp/snaps/snap-*; do
            theme="${d#tmp/snaps/snap-}"
            # If the canonical path already exists (e.g. a previous run
            # failed mid-flight), wipe it before moving — `mv` over an
            # existing dir is undefined.
            rm -rf "tmp/snaps/$theme"
            if [ -d "$d/tmp/snaps/$theme" ]; then
              mv "$d/tmp/snaps/$theme" "tmp/snaps/$theme"
              rm -rf "$d"
            else
              mv "$d" "tmp/snaps/$theme"
            fi
          done

          # actions/download-artifact@v7 extracts a single matched
          # artifact directly into `path` even with merge-multiple:false.
          # In that case we see `tmp/snaps/desktop/`, `mobile/`, etc.
          # and must wrap those viewport dirs in the only matrix theme.
          viewport_dirs=()
          for v in mobile tablet desktop wide; do
            if [ -d "tmp/snaps/$v" ]; then
              viewport_dirs+=("tmp/snaps/$v")
            fi
          done
          if [ "${#viewport_dirs[@]}" -gt 0 ]; then
            theme_count=$(python3 -c 'import json,os; print(len(json.loads(os.environ["THEMES_JSON"])))')
            if [ "$theme_count" != "1" ]; then
              echo "::error::Downloaded bare viewport snap dirs for multiple themes; cannot infer owner."
              exit 1
            fi
            theme=$(python3 -c 'import json,os; print(json.loads(os.environ["THEMES_JSON"])[0])')
            rm -rf "tmp/snaps/$theme"
            mkdir -p "tmp/snaps/$theme"
            for d in "${viewport_dirs[@]}"; do
              mv "$d" "tmp/snaps/$theme/"
            done
          fi
          echo "Aggregated themes:"
          ls -d tmp/snaps/*/ 2>/dev/null || echo "  (none)"

      # ----------------------------------------------------------------
      # check-changed / check-manual: run the strict gate
      # ----------------------------------------------------------------
      # Warn-only rollout was retired 2026-Q2: with the
      # FIFTY_REQUIRE_SNAP_EVIDENCE=1 escape, baselined `aero`, and
      # the bin/design.py snap+vision phases all in place, an unhappy
      # gate must hard-fail the workflow so the 50-theme batch flow
      # cannot ship a regression with a yellow warning. Re-enable
      # continue-on-error only with a documented justification.
      - name: Run snap.py report --strict
        id: report
        if: needs.setup.outputs.do_full_shoot != 'true'
        env:
          FIFTY_REQUIRE_SNAP_EVIDENCE: '1'
        run: python3 bin/snap.py report --strict

      # ----------------------------------------------------------------
      # regenerate-gallery: rebuild docs/snaps/ + auto-commit
      # ----------------------------------------------------------------
      - name: Rebuild gallery
        if: needs.setup.outputs.mode == 'regenerate-gallery'
        run: python3 bin/build-snap-gallery.py

      - name: Commit regenerated gallery
        if: needs.setup.outputs.mode == 'regenerate-gallery'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add docs/snaps

          # Bail without erroring if the regenerated gallery is byte-
          # identical to what's already committed (no theme/snap drift).
          if git diff --cached --quiet; then
            echo "No gallery changes to commit; tree is identical."
            exit 0
          fi

          # The literal "skip ci" directive (intentionally split below
          # so this comment doesn't accidentally trip the same flag
          # GitHub honors in commit messages) keeps the bot's commit
          # from re-triggering visual.yml (which would loop forever).
          # It also short-circuits check.yml — fine, the human pushes
          # that follow will run the static gate.
          msg="snap: regenerate retina gallery via cloud workflow [skip ci]

          Auto-generated by .github/workflows/visual.yml run #${{ github.run_id }}
          Mode: regenerate-gallery
          Themes: ${{ join(fromJSON(needs.setup.outputs.themes), ' ') }}
          "
          git commit -m "$msg"
          git push origin "HEAD:${{ github.ref_name }}"

      # ----------------------------------------------------------------
      # rebaseline: promote new snaps + screenshot.png + auto-commit
      # ----------------------------------------------------------------
      - name: Promote snaps to baseline
        if: needs.setup.outputs.mode == 'rebaseline'
        run: |
          # Iterate the explicit theme list (not --all) so themes that
          # weren't shot don't have their baselines accidentally
          # cleared by an over-eager promote. `jq -r '.[]'` is the
          # preinstalled-on-ubuntu-latest way to flatten the JSON array
          # output by setup into one slug per line.
          echo '${{ needs.setup.outputs.themes }}' | jq -r '.[]' | while read -r t; do
            python3 bin/snap.py baseline "$t"
          done

      - name: Regenerate per-theme screenshot.png
        if: needs.setup.outputs.mode == 'rebaseline'
        # `<theme>/screenshot.png` is a Pillow-cropped derivative of the
        # newly promoted `tests/visual-baseline/<theme>/desktop/home.png`,
        # so it MUST be regenerated whenever the baseline changes or the
        # admin Themes screen will drift back to the prior hero shot.
        run: |
          echo '${{ needs.setup.outputs.themes }}' | jq -r '.[]' | while read -r t; do
            python3 bin/build-theme-screenshots.py "$t"
          done

      - name: Commit rebaselined snaps + screenshots
        if: needs.setup.outputs.mode == 'rebaseline'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add tests/visual-baseline */screenshot.png

          if git diff --cached --quiet; then
            echo "No baseline changes to commit; tree is identical."
            exit 0
          fi

          # Intentionally NO skip-ci directive — the new baseline must
          # be gated by the next visual.yml run on this branch.
          msg="snap: rebaseline via cloud workflow

          Auto-generated by .github/workflows/visual.yml run #${{ github.run_id }}
          Mode: rebaseline
          Themes: ${{ join(fromJSON(needs.setup.outputs.themes), ' ') }}

          The new baseline will be re-gated by the visual.yml
          check-changed pass triggered by this commit. Review the diff
          carefully before merging — every changed PNG is a deliberate
          visual change you are signing off on.
          "
          git commit -m "$msg"
          git push origin "HEAD:${{ github.ref_name }}"

      # ----------------------------------------------------------------
      # Aggregated artifacts (always)
      # ----------------------------------------------------------------
      - name: Upload aggregated snap artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: snap-aggregate-${{ github.run_id }}
          path: |
            tmp/snaps/**/review.md
            tmp/snaps/**/review.json
            tmp/snaps/**/findings.json
            tmp/snaps/**/diffs/
          if-no-files-found: ignore
          retention-days: 14

      # The historical "warn-only reminder" step has been removed —
      # `bin/snap.py report --strict` now hard-fails the workflow.
