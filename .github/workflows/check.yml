name: check

# Authoritative server-side gate for the regression-prevention stack.
#
# Seven parallel jobs, one concern each, so a red CI tells you exactly
# what broke:
#
#   theme-gate              bin/check.py --all --offline (the original gate)
#   drift-check             bin/append-wc-overrides.py  must be a no-op
#   playground-sync-drift   bin/sync-playground.py      must be a no-op
#   brand-assets-drift      bin/build-brand-assets.py --check must pass
#   tooling-tests           pytest tests/ (Phase B + C unit + integration tests)
#   validator-smoke         tests/validator/ (Node editor-parity validator)
#   lint-format             ruff + mypy (Phase E)
#
# Jobs run in parallel; a single job failure still surfaces the
# full picture in the checks list on the PR page. None of the jobs
# depend on any other (the theme gate doesn't need pytest to have
# passed to be meaningful).
#
# All seven are required for merge; see `bin/setup-branch-protection.sh`.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  # Cancel older runs on the same branch so pushing a fix twice in a
  # row doesn't queue up two 10-minute pipelines. `main` is never
  # cancelled because we rely on its history in required-checks.
  group: check-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  theme-gate:
    name: bin/check.py --all --offline
    runs-on: ubuntu-latest
    # FIFTY_ALLOW_BASELINE_FAILURES=1 on PRs (NOT on push-to-main) tells
    # bin/check.py to consult tests/check-baseline-failures.json and
    # demote any (theme, check-title) pair already failing on main from
    # FAIL to WARN-BASELINE. The policy: feature branches are blocked
    # only by *new* regressions they introduce, not by pre-existing
    # debt on main. Push-to-main keeps the strict gate so the baseline
    # file stays honest -- if main regresses, the push-to-main run
    # fails and either someone fixes the regression or regenerates the
    # baseline via `python3 bin/check.py --save-baseline-failures`.
    env:
      FIFTY_ALLOW_BASELINE_FAILURES: ${{ github.event_name == 'pull_request' && '1' || '0' }}
    steps:
      - uses: actions/checkout@v6
        with:
          # The front-page-uniqueness check compares every theme's
          # structural fingerprint; it wants the full tree, not a
          # shallow clone.
          fetch-depth: 0
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - run: python3 bin/check.py --all --offline

  snap-evidence-gate:
    # Companion to theme-gate that enforces FIFTY_REQUIRE_SNAP_EVIDENCE=1
    # for the themes touched by the diff. Without this, a brand-new theme
    # could merge with a green CI just because it has no
    # `tmp/snaps/<theme>/` on the runner -- the same loophole that broke
    # the 50-theme batch flow before. We snap only the changed themes
    # with `--quick` (desktop x {home, shop, product-simple,
    # checkout-filled}) so the wall time stays inside ~5 min on the
    # common single-theme PR; touching framework files (bin/, etc.)
    # falls back to all themes via `--changed`'s heuristic.
    #
    # The full visual gate (every viewport x every route + the diff vs
    # tests/visual-baseline/) still runs in `.github/workflows/visual.yml`;
    # this job is the static-gate's evidence-required counterpart, not
    # a replacement for the visual workflow.
    name: bin/check.py --offline (snap evidence required)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: requirements-dev.txt
      - name: Install Python deps
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install -r requirements-dev.txt playwright==1.58.0 Pillow
      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ runner.os }}-1.58.0
      - name: Install Playwright Chromium
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: python3 -m playwright install --with-deps chromium
      - name: Install Playwright system deps (cache hit)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: python3 -m playwright install-deps chromium
      - name: Detect changed themes
        id: changed
        run: |
          # `bin/snap.py shoot --changed` returns themes touched by
          # uncommitted + origin/main..HEAD diff (with framework-wide
          # bin/* changes falling back to all themes via its own
          # heuristic). We need to know the count BEFORE shooting so
          # we can skip the evidence-required gate on PRs that don't
          # touch any theme (where requiring evidence for every theme
          # would be a false positive — the runner has no snaps).
          set +e
          themes="$(python3 -c '
          import sys, pathlib
          sys.path.insert(0, "bin")
          from snap import _changed_themes
          out = _changed_themes("origin/main") or []
          print(" ".join(out))
          ')"
          set -e
          echo "themes=$themes" >> "$GITHUB_OUTPUT"
          if [ -z "$themes" ]; then
            echo "has_themes=false" >> "$GITHUB_OUTPUT"
            echo "No themes touched by this PR; snap-evidence-gate is a no-op."
          else
            echo "has_themes=true" >> "$GITHUB_OUTPUT"
            echo "Will shoot + gate: $themes"
          fi
      - name: Restore Playground state cache (changed themes)
        # Same scheme as visual.yml: each changed theme gets a warm
        # WordPress install restored from the previous shoot on this
        # branch (or the `restore-keys:` fallback from main). snap.py's
        # `--cache-state` invalidates stale entries via the version
        # marker, so a partial/cross-theme restore is never unsafe.
        #
        # The path includes `tmp/playground-state/` wholesale rather
        # than per-theme because this job shoots 1..N changed themes
        # and the job doesn't know the slug list at step-setup time
        # without an extra shell hop. Wholesale caching is slightly
        # wasteful for single-theme PRs (unused theme dirs ride
        # along) but correctness is identical.
        if: steps.changed.outputs.has_themes == 'true'
        id: pg-state-cache
        uses: actions/cache@v5
        with:
          path: tmp/playground-state
          key: pg-state-v1-changed-${{ hashFiles('*/playground/**', 'package.json', 'package-lock.json') }}
          restore-keys: |
            pg-state-v1-changed-

      - name: Pre-shoot boot smoke
        # Tier 1.1 pre-100-themes hardening: run `snap.py boot <theme>`
        # against every changed theme BEFORE the full `snap.py shoot`
        # matrix. A PHP fatal, a template parse error, or a plugin-
        # activation crash shows up here in ~30-60s per theme instead
        # of deep into a 10-minute cell-by-cell fan-out.
        #
        # Shares the `--cache-state` dir with the shoot step below,
        # so the boot-smoke pass primes the cache: the shoot's own
        # Playground boot reuses the populated /wordpress dir and
        # only re-runs the blueprint's content-seeding step (~20-30s
        # warm) instead of the full WP + plugin install (~127s cold).
        # Net overhead on a green PR is small; on a red PR we save
        # the entire shoot's wall time.
        #
        # Boot-smoke verdict JSON lands at tmp/<theme>-boot.json and
        # is uploaded below on any failure so the PR author sees the
        # exact fatal without hunting through server logs.
        if: steps.changed.outputs.has_themes == 'true'
        env:
          FIFTY_CONTENT_REF: ${{ github.event.pull_request.head.sha || '' }}
        run: |
          fail=0
          for t in ${{ steps.changed.outputs.themes }}; do
            echo "::group::boot smoke: $t"
            if ! python3 bin/snap.py boot "$t" --cache-state; then
              fail=1
              echo "::error title=Boot smoke failed for $t::See tmp/$t-boot.json artifact"
            fi
            echo "::endgroup::"
          done
          exit $fail
      - name: Upload boot-smoke verdicts on failure
        if: failure() && steps.changed.outputs.has_themes == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: boot-smoke-verdicts
          path: tmp/*-boot.json
          if-no-files-found: ignore
          retention-days: 14

      - name: Shoot changed themes (quick subset)
        if: steps.changed.outputs.has_themes == 'true'
        # Pass `--changed-base origin/main` so brand-new themes (present on
        # the PR branch but not yet on main) are detected. Without it the
        # shoot step looks only at uncommitted + untracked on a fresh
        # checkout, finds nothing, and skips — leaving the evidence-required
        # check.py below to fail because tmp/snaps/<theme>/ never got
        # populated. See `_changed_themes()` in bin/snap.py.
        #
        # `--cache-state` reuses the warm /wordpress install restored
        # by the pg-state-cache step above; on cold cache it primes the
        # dir in-place and the post-job cache save persists it for the
        # next run. ~40-100s saved per theme per shoot on cache hit.
        #
        # FIFTY_CONTENT_REF: on a PR, rewrite main-branch URLs in the
        # blueprint to the PR head SHA so a brand-new theme's playground/
        # content + images resolve. See _retarget_content_ref() in snap.py.
        env:
          FIFTY_CONTENT_REF: ${{ github.event.pull_request.head.sha || '' }}
        run: >-
          python3 bin/snap.py shoot --changed --cache-state
          --changed-base origin/main --quick --concurrency 1
      - name: Run check.py with evidence required
        if: steps.changed.outputs.has_themes == 'true'
        # Same pr-only baseline allowlist as theme-gate (see the env
        # block at the top of that job for the full rationale): PR
        # runs demote pre-existing failures; push-to-main stays strict.
        env:
          FIFTY_REQUIRE_SNAP_EVIDENCE: '1'
          FIFTY_ALLOW_BASELINE_FAILURES: ${{ github.event_name == 'pull_request' && '1' || '0' }}
        # Per-theme check: only require evidence for the themes we
        # actually shot. This avoids the "I touched a doc, why is CI
        # demanding evidence for every theme on a fresh runner?"
        # false positive while still failing if a touched theme
        # somehow ended up without findings on disk.
        run: |
          for t in ${{ steps.changed.outputs.themes }}; do
            python3 bin/check.py "$t" --offline
          done

  drift-check:
    name: append-wc-overrides.py is a no-op
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - name: Verify the CSS-override chain matches committed theme.json
        run: |
          # bin/append-wc-overrides.py is sentinel-based: a clean re-run
          # is a no-op — every chunk should report "skip <sentinel>".
          # Any '+' line or 'FAIL' means the script's source drifted
          # past what's checked in and someone needs to re-run it.
          out="$(python3 bin/append-wc-overrides.py)"
          echo "$out"
          if echo "$out" | grep -qE '^\+|FAIL'; then
            echo
            echo "::error::bin/append-wc-overrides.py source has drifted"
            echo "         from the committed theme.json files. Run"
            echo "         \`python3 bin/append-wc-overrides.py\` locally"
            echo "         and commit the diff."
            exit 1
          fi

  brand-assets-drift:
    name: build-brand-assets.py --check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - name: Install Pillow
        # build-brand-assets.py needs Pillow to render the favicon set
        # and to hash-compare the existing PNG/ICO/OG bytes against
        # what it would write. Same single-dep install as brand.yml.
        run: python3 -m pip install Pillow
      - name: Install Chromium
        # The OG image render shells out to a Chrome/Chromium binary
        # at one of the paths in `_find_chrome()`. The apt build lands
        # at `/usr/bin/chromium-browser`, which is in that candidate
        # list. We install it even for `--check` because the script
        # currently re-renders to a temp file to compute the hash, so
        # Chrome is on the hot path either way.
        run: |
          sudo apt-get update -y
          sudo apt-get install -y chromium-browser
      - name: Verify brand assets match the SVG + OG template
        run: |
          # `--check` exits non-zero if any output PNG/ICO byte-differs
          # from what `bin/build-brand-assets.py` would produce now.
          # Trip the gate => someone edited `docs/favicon.svg`, the OG
          # HTML template inside the script, or the palette constants
          # without re-running the script. Run the cloud regenerator
          # via `gh workflow run brand.yml` to fix.
          if ! python3 bin/build-brand-assets.py --check; then
            echo
            echo "::error::Brand assets drifted from their source. Either"
            echo "         run \`python3 bin/build-brand-assets.py\` locally"
            echo "         and commit, or trigger the cloud regenerator:"
            echo "         \`gh workflow run brand.yml --ref \$BRANCH\`"
            exit 1
          fi

  playground-sync-drift:
    name: sync-playground.py is a no-op
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - name: Verify each blueprint.json matches its inlined playground/*.php
        run: |
          # bin/sync-playground.py inlines the shared playground/*.php
          # scripts into every theme's playground/blueprint.json (so
          # raw.githubusercontent.com cache + Playground's resource
          # cache can't serve a stale script body against a fresh
          # blueprint). It must be re-run after any edit to
          # playground/*.php; this gate catches the case where someone
          # forgot.
          #
          # The script writes in place, so the drift check is just "run
          # it, then `git diff --exit-code` the blueprint files". A
          # non-zero diff means the committed blueprints are out of
          # sync with the source PHP and someone needs to re-run the
          # script locally.
          python3 bin/sync-playground.py
          if ! git diff --quiet -- '*/playground/blueprint.json'; then
            echo
            echo "::error::sync-playground.py would rewrite committed"
            echo "         blueprint.json files. The inlined PHP is out"
            echo "         of date vs playground/*.php. Run"
            echo "         \`python3 bin/sync-playground.py\` locally"
            echo "         and commit the diff. The pending changes:"
            git --no-pager diff --stat -- '*/playground/blueprint.json'
            exit 1
          fi

  tooling-tests:
    name: pytest tests/
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: requirements-dev.txt
      - name: Install dev deps
        run: python3 -m pip install -r requirements-dev.txt
      - name: Run unit + integration tests
        run: python3 -m pytest tests/ --ignore=tests/validator -v

  validator-smoke:
    name: node blocks-validator smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: requirements-dev.txt
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: bin/blocks-validator/package-lock.json
      - name: Install Python dev deps (pytest runner)
        run: python3 -m pip install -r requirements-dev.txt
      - name: Install blocks-validator deps
        run: npm --prefix bin/blocks-validator ci
      - name: Run validator smoke tests
        run: python3 -m pytest tests/validator -v

  lint-format:
    name: ruff + mypy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: requirements-dev.txt
      - name: Install dev deps
        run: python3 -m pip install -r requirements-dev.txt
      - name: Run lint gate
        run: python3 bin/lint.py
