name: nightly-snap-sweep

# Scheduled full reshoot of every theme with Phase 2 signature skip
# DISABLED (`--no-skip`). The point is explicitly to NOT trust the
# signature manifest and instead compare fresh pixels against the
# committed baselines -- if the Chromium rasterizer, a bundled font,
# or any other snap.py input silently drifts in a way that our
# content-hash signature doesn't capture, this job is the canary.
#
# Without this workflow a drift that shifts every baseline by 2px
# would be invisible on PRs (Phase 2 would skip every cell because
# the ROUTE_DEPENDENCIES hashes didn't move) until someone changed
# a template, at which point suddenly-shot cells would look like
# regressions caused by that template edit. This job catches that
# scenario out-of-band so the fix can be a single rebaseline PR
# attributed to "ubuntu-latest Chromium update" rather than a
# confused "pattern edit made everything move 2px" review.
#
# ---- Schedule & scope -----------------------------------------------
# Cron: 08:00 UTC daily (~midnight PT). Far enough from typical push
# spikes that GitHub's scheduled-runner contention is minimal, and it
# lands in inbox-sized batches rather than on-demand.
#
# Shoots ALL themes in serial on a single runner with `--no-skip` and
# `--cache-state`. Serial (not matrix) is deliberate: the nightly run
# isn't latency-critical (it's a cron that only fires if drift
# actually occurred), and serial shares one Playwright browser cache
# + one warm Playground state across themes.
#
# ---- Output ----------------------------------------------------------
# On clean: no output, job succeeds, nobody notices. (Which is what
# you want 99% of the time.)
#
# On drift: `bin/snap.py diff --all` emits diff PNGs + a summary which
# we upload as an artifact and post a GitHub issue pointing at the
# run. The issue has label `snap-drift` so the backlog can surface
# batches of drift findings (e.g. "all 5 themes drifted by the same
# amount on the same day = Chromium bump" is a 1-PR fix; "one theme
# drifted while others didn't" is a real theme regression).

on:
  schedule:
    # 08:00 UTC every day.
    - cron: '0 8 * * *'
  workflow_dispatch:
    inputs:
      themes:
        description: 'Space-separated theme slugs (blank = all)'
        required: false
        default: ''
      skip_issue:
        description: 'Skip issue creation on drift (artifact-only)'
        type: boolean
        default: false
      rebaseline_mode:
        # Tier 1.4 of pre-100-themes hardening: surface which cells
        # WOULD be promoted by `bin/snap.py rebaseline` against the
        # current shoot, without writing anything. The operator can
        # click this from the Actions UI after a drift issue lands to
        # preview the scope of the rebaseline PR before they open it.
        description: 'Extra rebaseline preview to run after diff.'
        type: choice
        required: false
        default: 'none'
        options:
          - none
          - drifted
          - stale-7d
          - stale-30d
      rebaseline_threshold:
        description: 'Drift %% threshold for rebaseline preview'
        required: false
        default: '0.5'

concurrency:
  group: nightly-snap-sweep
  cancel-in-progress: false

permissions:
  contents: read
  # Required for the `peter-evans/create-issue-from-file` style step;
  # we use the gh CLI instead but the token still needs issues:write.
  issues: write

jobs:
  sweep:
    name: nightly sweep (--no-skip, all themes)
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: requirements-dev.txt

      - name: Install Python dependencies
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install -r requirements-dev.txt playwright==1.58.0 Pillow

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ runner.os }}-1.58.0

      - name: Install Playwright Chromium
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: python3 -m playwright install --with-deps chromium

      - name: Install system deps for Playwright (cache hit case)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: python3 -m playwright install-deps chromium

      - name: Restore Playground state cache (aggregate)
        # Shared cache across themes. We deliberately don't care about
        # per-theme isolation here -- the nightly sweep wants a warm
        # WordPress install per theme, and `snap.py --cache-state`
        # already keys `tmp/playground-state/<theme>/wordpress`
        # subdirs by theme slug.
        id: pg-state-cache
        uses: actions/cache@v5
        with:
          path: tmp/playground-state
          key: pg-state-v1-nightly-${{ hashFiles('*/playground/**', 'package.json', 'package-lock.json') }}
          restore-keys: |
            pg-state-v1-nightly-
            pg-state-v1-quick-

      - name: Full reshoot (no skip, no route narrowing)
        # --no-skip: bypass Phase 2 signature skip. Every cell boots
        # Playwright and re-captures from scratch. This is the whole
        # point of the workflow (catch Chromium / font drift that
        # hashes miss).
        #
        # No --auto-routes + no --changed: shoot every route in every
        # theme, not just those touched by a diff. The nightly run
        # doesn't have a diff base -- it's comparing today's
        # ubuntu-latest + today's Chromium + today's Chromium fonts
        # vs whatever shipped last.
        #
        # FIFTY_FORCE_RESHOOT mirrors --no-skip so recursive invocations
        # (none today, but future subprocesses) inherit the same
        # intent without a second CLI flag.
        env:
          FIFTY_FORCE_RESHOOT: '1'
          FIFTY_CONTENT_REF: ''
        run: |
          THEMES="${{ github.event.inputs.themes }}"
          if [ -n "$THEMES" ]; then
            for t in $THEMES; do
              python3 bin/snap.py shoot "$t" --cache-state --no-skip
            done
          else
            python3 bin/snap.py shoot --all --cache-state --no-skip
          fi

      - name: Diff against committed baselines
        id: diff
        # Exit code is meaningful: 0 = no drift, non-zero = drift found.
        # `continue-on-error` so we always reach the issue-filer step;
        # we read the exit code from steps.diff.outcome instead.
        continue-on-error: true
        run: python3 bin/snap.py diff --all

      - name: Report
        # `report` without --strict so a drift finding doesn't abort
        # before we upload artifacts. The diff step above is the
        # authoritative drift signal for this workflow.
        continue-on-error: true
        run: python3 bin/snap.py report

      - name: Rebaseline preview (workflow_dispatch only)
        # Runs `bin/snap.py rebaseline ... --dry-run` to surface the
        # cells that a follow-up rebaseline PR would touch. Written to
        # tmp/rebaseline-preview.txt so the file lands in the artifact
        # upload below. Never modifies tests/visual-baseline/ here --
        # the actual promotion happens in a human-opened PR.
        if: >-
          github.event_name == 'workflow_dispatch'
          && github.event.inputs.rebaseline_mode != 'none'
          && github.event.inputs.rebaseline_mode != ''
        continue-on-error: true
        run: |
          mode="${{ github.event.inputs.rebaseline_mode }}"
          threshold="${{ github.event.inputs.rebaseline_threshold }}"
          args=""
          case "$mode" in
            drifted)
              args="--drifted --threshold ${threshold:-0.5}"
              ;;
            stale-7d)
              args="--since 7d"
              ;;
            stale-30d)
              args="--since 30d"
              ;;
            *)
              echo "unknown rebaseline_mode: $mode"
              exit 1
              ;;
          esac
          themes_input="${{ github.event.inputs.themes }}"
          mkdir -p tmp
          if [ -n "$themes_input" ]; then
            for t in $themes_input; do
              echo "== rebaseline preview: $t ($mode) ==" \
                | tee -a tmp/rebaseline-preview.txt
              python3 bin/snap.py rebaseline "$t" $args --dry-run \
                2>&1 | tee -a tmp/rebaseline-preview.txt || true
            done
          else
            echo "== rebaseline preview: --all ($mode) ==" \
              | tee tmp/rebaseline-preview.txt
            python3 bin/snap.py rebaseline $args --dry-run \
              2>&1 | tee -a tmp/rebaseline-preview.txt || true
          fi

      - name: Upload sweep artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: nightly-snap-sweep-${{ github.run_id }}
          path: |
            tmp/snaps/**/*.png
            tmp/snaps/**/findings.json
            tmp/snaps/**/review.md
            tmp/snaps/**/review.json
            tmp/snaps/**/diffs/
            tmp/rebaseline-preview.txt
          if-no-files-found: warn
          retention-days: 30

      - name: File drift issue
        # Only runs when diff reported drift AND the human didn't tick
        # skip_issue on a manual dispatch. `gh issue create` is
        # preinstalled on ubuntu-latest and inherits GITHUB_TOKEN.
        if: >-
          steps.diff.outcome == 'failure'
          && github.event.inputs.skip_issue != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          title="nightly-snap-sweep: drift detected ($(date -u +%Y-%m-%d))"
          body=$(cat <<'EOF'
          The nightly snap sweep detected pixel drift against committed
          baselines in `tests/visual-baseline/`. Every cell was
          re-captured with `--no-skip`, so this is NOT a Phase 2 signature
          mismatch -- it's the Chromium / font / raster pipeline itself
          producing different pixels.

          Next steps:
            1. Download the workflow artifact `nightly-snap-sweep-<run_id>`
               and inspect `tmp/snaps/<theme>/<vp>/diffs/*.png` to confirm
               the drift is uniform (Chromium bump) vs theme-specific
               (regression).
            2. If uniform: run `python3 bin/snap.py baseline --all` and
               open a PR titled `snap: rebaseline after ubuntu-latest
               Chromium bump`. Phase 2 signatures will re-stamp so
               future PRs skip cleanly against the new baseline.
            3. If theme-specific: treat as a real regression -- bisect
               which commit introduced it and either fix or rebaseline
               with an explicit reason in the PR body.

          Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          EOF
          )
          gh issue create \
            --title "$title" \
            --body "$body" \
            --label snap-drift

  baseline-decay:
    # Tier 2.4 of the pre-100-themes hardening plan: keep the baseline
    # allowlist (tests/check-baseline-failures.json) from quietly
    # accumulating permanent debt. Runs nightly, completely
    # independent of the snap sweep (cheap Python scan), and opens a
    # single issue whenever any entry is older than 30 days or is
    # missing a justification / owner. Intentionally no auto-prune:
    # the allow list is a safety net, not a to-do list the bot gets
    # to edit.
    name: baseline allow-list decay check
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - name: Run baseline decay scan
        id: decay
        continue-on-error: true
        run: |
          python3 bin/check.py --baseline-decay \
            --baseline-decay-days 30 \
            2>&1 | tee tmp-baseline-decay.log
          echo "exit=${PIPESTATUS[0]}" >> "$GITHUB_OUTPUT"
      - name: Upload decay log
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: baseline-decay-${{ github.run_id }}
          path: tmp-baseline-decay.log
          if-no-files-found: ignore
          retention-days: 30
      - name: File baseline-decay issue
        # Only runs on scheduled invocations (the cron) so manual
        # dispatches used for debugging don't spam the issue tracker.
        # Matches the snap-drift gate above.
        if: >-
          steps.decay.outputs.exit != '0'
          && github.event_name == 'schedule'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          title="baseline-decay: stale / undocumented entries ($(date -u +%Y-%m-%d))"
          {
            echo "\`tests/check-baseline-failures.json\` has entries that need"
            echo "attention. See the attached \`baseline-decay-<run_id>\` artifact,"
            echo "or scroll the job log, for the full list."
            echo ""
            echo "For each entry listed below, the owner is expected to either:"
            echo ""
            echo "  1. Fix the underlying check and re-run"
            echo "     \`python3 bin/check.py --save-baseline-failures\` from"
            echo "     origin/main to drop the entry; or"
            echo "  2. Hand-edit \`tests/check-baseline-failures.json\` to add a"
            echo "     real \`justification\` explaining why this debt is staying"
            echo "     in the allow list."
            echo ""
            echo "Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          } > issue-body.md
          gh issue create \
            --title "$title" \
            --body-file issue-body.md \
            --label baseline-decay
